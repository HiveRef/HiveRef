services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hiveref-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    expose:
      - "9000"
    environment:
      - RUN_BOOTSTRAP=true
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=hiveref
      - DB_USERNAME=hiveref
      - DB_PASSWORD=hiveref
      - REDIS_HOST=redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - hiveref

  nginx:
    image: nginx:stable-alpine
    container_name: hiveref-nginx
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - hiveref

  vite:
    image: node:24
    container_name: hiveref-vite
    restart: unless-stopped
    user: "1000:1000"
    working_dir: /var/www
    volumes:
      - .:/var/www
    entrypoint: ["sh", "-c", "[ ! -d node_modules ] && npm install --legacy-peer-deps; npm run dev"]
    ports:
      - "5174:5174"
    networks:
      - hiveref

  postgres:
    image: postgres:17
    container_name: hiveref-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: hiveref
      POSTGRES_USER: hiveref
      POSTGRES_PASSWORD: hiveref
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hiveref"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hiveref

  redis:
    image: redis:7-alpine
    container_name: hiveref-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - hiveref

  horizon:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hiveref-horizon
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    environment:
      - RUN_BOOTSTRAP=false
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=hiveref
      - DB_USERNAME=hiveref
      - DB_PASSWORD=hiveref
      - REDIS_HOST=redis
    command: ["php", "artisan", "horizon"]
    depends_on:
      - app
      - redis
    networks:
      - hiveref

volumes:
  pgdata:
  redisdata:

networks:
  hiveref:
